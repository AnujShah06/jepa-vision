# overfit.yaml -- Step 1.3 overfit pre-flight check
# 500 STL-10 images, no augmentation, prod model config.
# Goal: pred_loss should approach ~0 within 200 epochs.
# If it plateaus above 0.05, debug before running the full reference.

data:
  n_images: 500          # Subset of unlabeled split
  augment: false         # ToTensor + Normalize only (no RandomResizedCrop)
  batch_size: 64
  num_workers: 0
  seed: 0

model:
  img_size: 96
  patch_size: 8
  d_model: 192
  enc_layers: 6
  enc_heads: 3
  pred_layers: 3
  pred_width: 96
  pred_heads: 3
  sigreg_weight: 1.0
  sigreg_projections: 64
  ema_decay: 0.996
  use_ema: true
  dropout: 0.0

train:
  epochs: 200
  lr: 1.0e-3
  weight_decay: 0.04
  warmup_epochs: 5
  grad_clip: 1.0
  ckpt_every: 200        # only save at end
  diag_every: 5
  ema_start: 0.996
  ema_end: 1.0
  use_amp: true

wandb:
  project: jepa-vision
  entity: entropy_chess
  tags: ["overfit-check", "step-1.3"]
